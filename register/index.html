<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MRS Reg">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-152.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <title>MRS Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        #app {
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        #header {
            padding: 12px 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        #header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #da7e7e;
        }

        #status {
            font-size: 12px;
            color: #888;
        }

        #status.active { color: #4caf50; }
        #status.error { color: #f44336; }

        .view {
            display: none;
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="url"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #da7e7e;
        }

        input::placeholder {
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: 1px solid #da7e7e;
            border-radius: 8px;
            background: transparent;
            color: #da7e7e;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 10px;
        }

        .btn:active {
            background: #da7e7e;
            color: #0a0a0a;
        }

        .btn.primary {
            background: #da7e7e;
            color: #0a0a0a;
        }

        .btn.primary:active {
            background: #c46a6a;
        }

        .btn.secondary {
            border-color: #555;
            color: #888;
            font-size: 14px;
        }

        .link-btn {
            background: none;
            border: none;
            color: #da7e7e;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 0;
            text-decoration: underline;
        }

        .location-display {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .location-display .coords {
            font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
            font-size: 14px;
            color: #da7e7e;
            margin-bottom: 4px;
        }

        .location-display .accuracy {
            font-size: 12px;
            color: #888;
        }

        .location-display .refresh-hint {
            font-size: 11px;
            color: #555;
            margin-top: 4px;
        }

        .result-box {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: #c8d6e5;
        }

        .result-box.success {
            border-color: #4caf50;
        }

        .result-box.fail {
            border-color: #f44336;
        }

        .user-bar {
            padding: 8px 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .user-bar .identity {
            font-size: 13px;
            color: #4caf50;
        }

        .user-bar button {
            background: none;
            border: 1px solid #555;
            border-radius: 6px;
            color: #888;
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
        }

        .section-title {
            font-size: 14px;
            color: #da7e7e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .error-msg {
            color: #f44336;
            font-size: 13px;
            margin-top: 8px;
        }

        .reg-card {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .reg-card .reg-url {
            color: #da7e7e;
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 6px;
        }

        .reg-card .reg-meta {
            font-size: 12px;
            color: #888;
        }

        .reg-card .reg-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .reg-card .reg-actions button {
            background: none;
            border: 1px solid #555;
            border-radius: 6px;
            color: #888;
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
        }

        .reg-card .reg-actions button.delete {
            border-color: #f44336;
            color: #f44336;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .tabs button.active {
            color: #da7e7e;
            border-bottom-color: #da7e7e;
        }

        .startup-message {
            text-align: center;
            color: #666;
            margin-top: 40px;
            line-height: 1.6;
        }

        .startup-message .icon {
            font-size: 36px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            <h1>MRS Register</h1>
            <span id="status">Not logged in</span>
        </div>

        <!-- Auth View -->
        <div id="view-auth" class="view active">
            <div id="auth-login">
                <div class="section-title">Log In</div>
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="username" autocapitalize="none" autocorrect="off">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="password">
                </div>
                <div id="login-error" class="error-msg"></div>
                <button class="btn primary" id="btn-login">Log In</button>
                <button class="link-btn" id="btn-show-signup">Need an account? Sign up</button>
            </div>

            <div id="auth-signup" style="display:none">
                <div class="section-title">Create Account</div>
                <div class="form-group">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" placeholder="username" autocapitalize="none" autocorrect="off">
                </div>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="min 8 characters">
                </div>
                <div id="signup-error" class="error-msg"></div>
                <button class="btn primary" id="btn-signup">Create Account</button>
                <button class="link-btn" id="btn-show-login">Already have an account? Log in</button>
            </div>
        </div>

        <!-- Main View (after auth) -->
        <div id="view-main" class="view">
            <div class="user-bar" id="user-bar" style="display:none">
                <span class="identity" id="user-identity"></span>
                <button id="btn-logout">Log out</button>
            </div>

            <div class="tabs" id="main-tabs" style="display:none">
                <button class="active" data-tab="register">Register</button>
                <button data-tab="my-regs">My Registrations</button>
            </div>

            <!-- Register Tab -->
            <div id="tab-register">
                <div class="section-title">Location</div>
                <div class="location-display" id="location-box">
                    <div class="coords" id="coords-display">Getting location...</div>
                    <div class="accuracy" id="accuracy-display"></div>
                    <div class="refresh-hint">Tap "Refresh Location" to update</div>
                </div>
                <button class="btn secondary" id="btn-refresh-location">Refresh Location</button>

                <div class="section-title" style="margin-top:20px">Service Point</div>
                <div class="form-group">
                    <label for="reg-url">URL (https)</label>
                    <input type="url" id="reg-url" placeholder="https://example.com/my-service">
                </div>

                <div class="form-group">
                    <label for="reg-radius">Radius (meters)</label>
                    <input type="number" id="reg-radius" value="50" min="1" max="1000000" placeholder="50">
                </div>

                <div id="reg-error" class="error-msg"></div>
                <button class="btn primary" id="btn-register">Register</button>

                <div id="reg-result"></div>
            </div>

            <!-- My Registrations Tab -->
            <div id="tab-my-regs" style="display:none">
                <div class="section-title">My Registrations</div>
                <div id="my-regs-list">
                    <div class="startup-message">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var MRS_SERVER = "https://owen.iz.net";
        var token = null;
        var currentLat = null;
        var currentLon = null;
        var currentEle = 0;
        var currentAccuracy = null;

        // DOM refs
        var statusEl = document.getElementById("status");
        var viewAuth = document.getElementById("view-auth");
        var viewMain = document.getElementById("view-main");
        var authLogin = document.getElementById("auth-login");
        var authSignup = document.getElementById("auth-signup");
        var userBar = document.getElementById("user-bar");
        var mainTabs = document.getElementById("main-tabs");
        var userIdentity = document.getElementById("user-identity");
        var coordsDisplay = document.getElementById("coords-display");
        var accuracyDisplay = document.getElementById("accuracy-display");
        var regResult = document.getElementById("reg-result");
        var myRegsList = document.getElementById("my-regs-list");

        function setStatus(text, type) {
            statusEl.textContent = text;
            statusEl.className = type || "";
        }

        // ---- Persistence ----

        function saveSession() {
            if (token) {
                localStorage.setItem("mrs_token", token);
            } else {
                localStorage.removeItem("mrs_token");
            }
        }

        function loadSession() {
            token = localStorage.getItem("mrs_token");
            if (token) {
                showMainView();
                fetchIdentity();
            }
        }

        // ---- API helpers ----

        function apiRequest(method, path, body, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open(method, MRS_SERVER + path, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            if (token) {
                xhr.setRequestHeader("Authorization", "Bearer " + token);
            }
            xhr.onload = function () {
                var data = null;
                try { data = JSON.parse(xhr.responseText); } catch (e) {}
                callback(xhr.status, data, xhr.responseText);
            };
            xhr.onerror = function () {
                callback(0, null, "Network error");
            };
            xhr.send(body ? JSON.stringify(body) : null);
        }

        // ---- Auth ----

        document.getElementById("btn-show-signup").addEventListener("click", function () {
            authLogin.style.display = "none";
            authSignup.style.display = "block";
        });

        document.getElementById("btn-show-login").addEventListener("click", function () {
            authSignup.style.display = "none";
            authLogin.style.display = "block";
        });

        document.getElementById("btn-login").addEventListener("click", function () {
            var username = document.getElementById("login-username").value.trim();
            var password = document.getElementById("login-password").value;
            var errEl = document.getElementById("login-error");
            errEl.textContent = "";

            if (!username || !password) {
                errEl.textContent = "Username and password required";
                return;
            }

            setStatus("Logging in...", "active");
            apiRequest("POST", "/auth/login", { username: username, password: password }, function (status, data, raw) {
                if (status === 200 && data && data.token) {
                    token = data.token;
                    saveSession();
                    showMainView();
                    fetchIdentity();
                } else {
                    var msg = (data && data.detail) ? data.detail : "Login failed (HTTP " + status + ")";
                    errEl.textContent = msg;
                    setStatus("Login failed", "error");
                }
            });
        });

        document.getElementById("btn-signup").addEventListener("click", function () {
            var username = document.getElementById("signup-username").value.trim();
            var email = document.getElementById("signup-email").value.trim();
            var password = document.getElementById("signup-password").value;
            var errEl = document.getElementById("signup-error");
            errEl.textContent = "";

            if (!username || !email || !password) {
                errEl.textContent = "All fields are required";
                return;
            }

            if (password.length < 8) {
                errEl.textContent = "Password must be at least 8 characters";
                return;
            }

            setStatus("Creating account...", "active");
            apiRequest("POST", "/auth/register", { username: username, email: email, password: password }, function (status, data, raw) {
                if (status === 201 && data && data.token) {
                    token = data.token;
                    saveSession();
                    showMainView();
                    fetchIdentity();
                } else {
                    var msg = (data && data.detail) ? data.detail : "Registration failed (HTTP " + status + ")";
                    errEl.textContent = msg;
                    setStatus("Signup failed", "error");
                }
            });
        });

        document.getElementById("btn-logout").addEventListener("click", function () {
            token = null;
            saveSession();
            showAuthView();
            setStatus("Not logged in", "");
        });

        function fetchIdentity() {
            apiRequest("GET", "/auth/me", null, function (status, data) {
                if (status === 200 && data && data.id) {
                    userIdentity.textContent = data.id;
                    setStatus("Logged in", "active");
                } else if (status === 401) {
                    token = null;
                    saveSession();
                    showAuthView();
                    setStatus("Session expired", "error");
                }
            });
        }

        // ---- Views ----

        function showMainView() {
            viewAuth.classList.remove("active");
            viewMain.classList.add("active");
            userBar.style.display = "flex";
            mainTabs.style.display = "flex";
            getLocation();
        }

        function showAuthView() {
            viewMain.classList.remove("active");
            viewAuth.classList.add("active");
            userBar.style.display = "none";
            mainTabs.style.display = "none";
        }

        // ---- Tabs ----

        var tabButtons = mainTabs.querySelectorAll("button");
        for (var i = 0; i < tabButtons.length; i++) {
            tabButtons[i].addEventListener("click", function () {
                for (var j = 0; j < tabButtons.length; j++) {
                    tabButtons[j].classList.remove("active");
                }
                this.classList.add("active");

                var tab = this.getAttribute("data-tab");
                document.getElementById("tab-register").style.display = tab === "register" ? "block" : "none";
                document.getElementById("tab-my-regs").style.display = tab === "my-regs" ? "block" : "none";

                if (tab === "my-regs") {
                    loadMyRegistrations();
                }
            });
        }

        // ---- Geolocation ----

        function getLocation() {
            if (!navigator.geolocation) {
                coordsDisplay.textContent = "Geolocation not supported";
                return;
            }

            coordsDisplay.textContent = "Getting location...";
            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;
                    currentEle = pos.coords.altitude || 0;
                    currentAccuracy = pos.coords.accuracy;
                    coordsDisplay.textContent = currentLat.toFixed(6) + ", " + currentLon.toFixed(6);
                    if (currentEle !== 0) {
                        coordsDisplay.textContent += " (" + currentEle.toFixed(1) + "m ele)";
                    }
                    accuracyDisplay.textContent = "Accuracy: ~" + Math.round(currentAccuracy) + "m";
                },
                function (err) {
                    coordsDisplay.textContent = "Location error: " + err.message;
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        document.getElementById("btn-refresh-location").addEventListener("click", getLocation);

        // ---- Registration ----

        document.getElementById("btn-register").addEventListener("click", function () {
            var url = document.getElementById("reg-url").value.trim();
            var radius = parseFloat(document.getElementById("reg-radius").value);
            var errEl = document.getElementById("reg-error");
            errEl.textContent = "";
            regResult.innerHTML = "";

            if (currentLat === null || currentLon === null) {
                errEl.textContent = "Location not yet available. Tap Refresh Location.";
                return;
            }

            if (!url) {
                errEl.textContent = "Service point URL is required";
                return;
            }

            if (!/^https:\/\/.+/.test(url)) {
                errEl.textContent = "URL must start with https://";
                return;
            }

            if (!radius || radius <= 0) {
                errEl.textContent = "Radius must be greater than 0";
                return;
            }

            setStatus("Registering...", "active");

            var body = {
                space: {
                    type: "sphere",
                    center: {
                        lat: currentLat,
                        lon: currentLon,
                        ele: currentEle
                    },
                    radius: radius
                },
                service_point: url
            };

            apiRequest("POST", "/register", body, function (status, data, raw) {
                if (status === 201 && data) {
                    setStatus("Registered", "active");
                    regResult.innerHTML = '<div class="result-box success">' + escapeHtml(JSON.stringify(data, null, 2)) + '</div>';
                } else {
                    setStatus("Registration failed", "error");
                    var msg = (data && data.detail) ? data.detail : raw;
                    regResult.innerHTML = '<div class="result-box fail">' + escapeHtml(typeof msg === "string" ? msg : JSON.stringify(msg, null, 2)) + '</div>';
                }
            });
        });

        // ---- My Registrations ----

        function loadMyRegistrations() {
            myRegsList.innerHTML = '<div class="startup-message">Loading...</div>';

            apiRequest("GET", "/auth/me/registrations", null, function (status, data) {
                myRegsList.innerHTML = "";

                if (status !== 200 || !data || !data.registrations) {
                    myRegsList.innerHTML = '<div class="startup-message">Failed to load registrations</div>';
                    return;
                }

                var regs = data.registrations;
                if (regs.length === 0) {
                    myRegsList.innerHTML = '<div class="startup-message">No registrations yet</div>';
                    return;
                }

                for (var i = 0; i < regs.length; i++) {
                    var reg = regs[i];
                    var card = document.createElement("div");
                    card.className = "reg-card";

                    var urlDiv = document.createElement("div");
                    urlDiv.className = "reg-url";
                    urlDiv.textContent = reg.service_point || "(foad)";
                    card.appendChild(urlDiv);

                    var meta = document.createElement("div");
                    meta.className = "reg-meta";
                    var center = reg.space && reg.space.center ? reg.space.center : {};
                    meta.textContent = (center.lat || 0).toFixed(4) + ", " + (center.lon || 0).toFixed(4) +
                        " | radius: " + ((reg.space && reg.space.radius) || "?") + "m" +
                        " | v" + (reg.version || 1);
                    card.appendChild(meta);

                    var actions = document.createElement("div");
                    actions.className = "reg-actions";

                    var delBtn = document.createElement("button");
                    delBtn.className = "delete";
                    delBtn.textContent = "Release";
                    delBtn.setAttribute("data-id", reg.id);
                    delBtn.addEventListener("click", function () {
                        var regId = this.getAttribute("data-id");
                        releaseRegistration(regId);
                    });
                    actions.appendChild(delBtn);

                    card.appendChild(actions);
                    myRegsList.appendChild(card);
                }
            });
        }

        function releaseRegistration(regId) {
            apiRequest("POST", "/release", { id: regId }, function (status, data) {
                if (status >= 200 && status < 300) {
                    setStatus("Released", "active");
                    loadMyRegistrations();
                } else {
                    var msg = (data && data.detail) ? data.detail : "Release failed";
                    setStatus(typeof msg === "string" ? msg : "Release failed", "error");
                }
            });
        }

        // ---- Util ----

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // ---- Service Worker ----

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }

        // ---- Init ----

        loadSession();
    </script>
</body>
</html>
